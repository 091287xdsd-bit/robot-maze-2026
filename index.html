<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ROBOT MAZE CHAMPIONSHIP - PRO EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: #111; --accent: #ff0055; --gray: #444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; }
        .live-tag { background: var(--accent); padding: 5px 15px; border-radius: 4px; font-weight: bold; animation: blink 1s infinite; }

        /* MẶC ĐỊNH ẨN CÁC THÀNH PHẦN CỦA ADMIN */
        .admin-only { display: none !important; }
        
        /* NẾU LÀ ADMIN THÌ MỚI HIỆN RA */
        body.is-admin .admin-only { display: flex !important; }
        body.is-admin button.admin-only { display: inline-block !important; }
        body.is-admin th.admin-only, body.is-admin td.admin-only { display: table-cell !important; }

        .setup-box { background: var(--card); padding: 20px; border-radius: 12px; gap: 15px; margin-bottom: 20px; align-items: center; border: 1px solid #333; }
        input, select { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; font-size: 1rem; }

        .main-display { text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); padding: 40px; border-radius: 30px; border: 1px solid #222; margin-bottom: 30px; }
        .current-team-name { font-size: 1.5rem; color: var(--neon); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 15px; }
        #display { font-family: 'JetBrains Mono', monospace; font-size: 8rem; color: white; text-shadow: 0 0 30px var(--neon); display: inline-block; letter-spacing: -2px; }

        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab { padding: 8px 20px; background: #222; border: 1px solid #444; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .tab.active { background: var(--neon); color: black; font-weight: bold; }
        .btn-reset { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 0.7rem; }
        .btn-reset:hover { background: var(--accent); color: white; }

        .stats-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .box { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #222; }
        h3 { border-left: 4px solid var(--neon); padding-left: 10px; margin: 0 0 15px 0; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #888; font-size: 0.8rem; padding: 10px; border-bottom: 2px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 0.95rem; }
        
        .rank-gold { color: #ffd700; font-weight: bold; }
        .delete-btn { color: #555; cursor: pointer; font-weight: bold; border: none; background: none; }
        .delete-btn:hover { color: var(--accent); }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 1.2rem; font-weight: bold; letter-spacing: 2px;">ROBOT MAZE <span style="color:var(--neon)">CHAMPIONSHIP 2026</span></div>
    <div class="live-tag">● LIVE STREAM</div>
</div>

<div class="setup-box admin-only">
    <input type="text" id="teamInput" placeholder="TÊN ĐỘI..." style="flex-grow: 1;">
    <select id="roundSelect">
        <option value="Vòng Loại 1">Vòng Loại 1</option>
        <option value="Vòng Loại 2">Vòng Loại 2</option>
        <option value="Bán Kết">Bán Kết</option>
        <option value="Chung Kết">Chung Kết</option>
    </select>
    <button onclick="startTimer()" style="background:var(--neon); color:black; font-weight:bold; padding: 12px 30px; border-radius: 6px; border:none; cursor:pointer;">START</button>
    <button onclick="stopTimer()" style="background:var(--accent); color:white; font-weight:bold; padding: 12px 30px; border-radius: 6px; border:none; cursor:pointer;">STOP</button>
</div>

<div class="main-display">
    <div class="current-team-name" id="activeTeam">SẴN SÀNG</div>
    <div id="display">00:00:00:000</div>
</div>

<div class="stats-grid">
    <div class="box">
        <h3>
            BẢNG XẾP HẠNG
            <button class="btn-reset admin-only" onclick="resetRound()">RESET VÒNG NÀY</button>
        </h3>
        <div id="tabList" class="tab-container"></div>
        <table>
            <thead>
                <tr><th>#</th><th>Đội</th><th>Kết Quả</th><th class="admin-only">Hành động</th></tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <div class="box">
        <h3>
            CHI TIẾT ĐỘI
            <button class="btn-reset admin-only" onclick="resetTeam()">RESET ĐỘI NÀY</button>
        </h3>
        <select id="teamFilter" onchange="showTeamStats()" style="width:100%; margin-bottom:15px;"></select>
        <div id="teamStatsContent"></div>
    </div>
</div>

<script>
    // --- 1. HỆ THỐNG PHÂN QUYỀN ADMIN BẰNG URL ---
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === 'phongtin'; // Pass bí mật của bạn
    
    if (isAdmin) {
        // Mở khóa giao diện hiển thị các nút điều khiển
        document.body.classList.add('is-admin');
    }

    // --- 2. KẾT NỐI FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyAmvTxTxZ-xfRPtyPCRe9eQ8q2T0dRFfqs",
        authDomain: "robot-maze-2026.firebaseapp.com",
        databaseURL: "https://robot-maze-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "robot-maze-2026",
        storageBucket: "robot-maze-2026.firebasestorage.app",
        messagingSenderId: "339131921578",
        appId: "1:339131921578:web:1927fa0c6cb2ec7ef48cd3",
        measurementId: "G-CJHTEMJG1X"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    
    // --- 3. ĐỒNG BỘ THỜI GIAN MÁY CHỦ (CHỐNG TRỄ GIÂY) ---
    let serverOffset = 0;
    db.ref('.info/serverTimeOffset').on('value', function(snapshot) {
        serverOffset = snapshot.val() || 0;
    });
    function getTrueTime() { return Date.now() + serverOffset; }

    let database = [];
    let currentTab = "Vòng Loại 1";
    let startTime = 0;
    let timerInterval;

    // Lắng nghe dữ liệu Bảng xếp hạng
    db.ref("maze_results").on("value", (snapshot) => {
        const data = snapshot.val();
        database = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
        renderAll();
    });

    // Format hiển thị
    function formatTime(ms) {
        let hours = Math.floor(ms / 3600000);
        let minutes = Math.floor((ms % 3600000) / 60000);
        let seconds = Math.floor((ms % 60000) / 1000);
        let milis = ms % 1000;
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}:${milis.toString().padStart(3, '0')}`;
    }

    // --- 4. LOGIC ĐIỀU KHIỂN CỦA ADMIN ---
    function startTimer() {
        if (!isAdmin) return; // Khóa chức năng với khách
        
        const teamName = document.getElementById("teamInput").value || "Ẩn danh";
        const roundName = document.getElementById("roundSelect").value;
        
        // Gửi tín hiệu báo "Đang chạy" cho tất cả mọi người xem
        db.ref("current_state").set({
            status: "running",
            team: teamName,
            round: roundName,
            startTimestamp: getTrueTime()
        });
    }

    function stopTimer() {
        if (!isAdmin) return; // Khóa chức năng với khách
        
        const stopTimestamp = getTrueTime();
        
        // Tính giờ thực tế từ Firebase để chốt kết quả siêu chính xác
        db.ref("current_state").once("value", (snapshot) => {
            const state = snapshot.val();
            if(state && state.status === "running") {
                const finalElapsed = stopTimestamp - state.startTimestamp;
                const finalTimeStr = formatTime(finalElapsed);
                
                // Báo cho khán giả dừng đồng hồ
                db.ref("current_state").set({
                    status: "stopped",
                    finalTimeStr: finalTimeStr,
                    team: state.team
                });

                // Lưu lên bảng xếp hạng
                const record = { 
                    team: state.team, 
                    round: state.round, 
                    time: finalElapsed, 
                    timeStr: finalTimeStr,
                    timestamp: getTrueTime()
                };
                db.ref("maze_results").push(record);
                currentTab = state.round;
            }
        });
    }

    function deleteRecord(id) {
        if(!isAdmin) return;
        if(confirm("Xóa kết quả này trên Cloud?")) {
            db.ref("maze_results/" + id).remove();
        }
    }

    function resetRound() {
        if(!isAdmin) return;
        if(confirm(`Xóa TẤT CẢ kết quả của ${currentTab}?`)) {
            database.forEach(item => {
                if(item.round === currentTab) db.ref("maze_results/" + item.id).remove();
            });
        }
    }

    function resetTeam() {
        if(!isAdmin) return;
        const team = document.getElementById("teamFilter").value;
        if(!team) return;
        if(confirm(`Xóa lịch sử thi đấu của đội ${team}?`)) {
            database.forEach(item => {
                if(item.team === team) db.ref("maze_results/" + item.id).remove();
            });
        }
    }

    // --- 5. LẮNG NGHE TÍN HIỆU LIVE TỪ ADMIN (DÀNH CHO KHÁN GIẢ) ---
    db.ref("current_state").on("value", (snapshot) => {
        const state = snapshot.val();
        if (!state) return;

        if (state.status === "running") {
            // Khi Admin bấm Start, khán giả tự khởi động đồng hồ dựa trên mốc Server
            document.getElementById("activeTeam").innerText = state.team;
            startTime = state.startTimestamp;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = getTrueTime() - startTime;
                document.getElementById("display").innerText = formatTime(diff > 0 ? diff : 0);
            }, 10);
            
        } else if (state.status === "stopped") {
            // Khi Admin bấm Stop, ép hiện số chính xác cuối cùng
            clearInterval(timerInterval);
            if (state.finalTimeStr) {
                document.getElementById("display").innerText = state.finalTimeStr;
            }
        }
    });

    // --- 6. RENDER GIAO DIỆN ---
    function renderAll() {
        const rounds = ["Vòng Loại 1", "Vòng Loại 2", "Bán Kết", "Chung Kết"];
        let tabsHtml = "";
        rounds.forEach(r => {
            tabsHtml += `<div class="tab ${currentTab === r ? 'active' : ''}" onclick="currentTab='${r}'; renderAll()">${r}</div>`;
        });
        document.getElementById("tabList").innerHTML = tabsHtml;

        const lbBody = document.getElementById("leaderboardBody");
        lbBody.innerHTML = "";
        const filtered = database.filter(i => i.round === currentTab).sort((a,b) => a.time - b.time);
        
        filtered.forEach((item, index) => {
            lbBody.innerHTML += `<tr>
                <td class="${index < 3 ? 'rank-gold' : ''}">#${index + 1}</td>
                <td>${item.team}</td>
                <td style="color:var(--neon); font-family: 'JetBrains Mono'">${item.timeStr}</td>
                <td class="admin-only"><button class="delete-btn" onclick="deleteRecord('${item.id}')">✖</button></td>
            </tr>`;
        });

        const filter = document.getElementById("teamFilter");
        const teams = [...new Set(database.map(item => item.team))];
        filter.innerHTML = '<option value="">-- Chọn đội để xem --</option>' + 
                         teams.map(t => `<option value="${t}">${t}</option>`).join("");
        showTeamStats();
    }

    function showTeamStats() {
        const team = document.getElementById("teamFilter").value;
        const content = document.getElementById("teamStatsContent");
        if(!team) return content.innerHTML = "";
        
        const runs = database.filter(item => item.team === team);
        let html = `<p style="color:var(--neon); font-size:0.8rem">Lịch sử chạy:</p>`;
        runs.forEach(run => {
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid #222; padding-bottom:3px;">
                <span>${run.round}</span>
                <strong style="font-family: 'JetBrains Mono'">${run.timeStr}</strong>
            </div>`;
        });
        content.innerHTML = html;
    }

</script>
</body>
</html>
